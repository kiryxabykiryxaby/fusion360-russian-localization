<div id="machine_nozzle_diameters_0_xxxx"><p>Это диаметр экструзии сопла. Он определяет ширину дорожки, которую использует расчет траектории инструмента. Это не диаметр филамента, который задается в <em>Настройках печати</em>.
Подсказка: Для компенсации over- или underextrusion используйте <em>Множитель ширины экструзии</em>, также в <em>Настройках печати</em>.</p>
